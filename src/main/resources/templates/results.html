<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Match Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }

        .card {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #fafafa;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 16px;
            background: #222;
            color: white;
            border-radius: 8px;
        }

        .button:hover {
            background: #444;
        }

        .empty {
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Matched Underwriters</h1>

    <div th:if="${#lists.isEmpty(results)}" class="empty">
        No matching underwriters found.
    </div>

    <table th:if="${!#lists.isEmpty(results)}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Website</th>
            <th>Address</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${results}">
            <td th:text="${r.underwriterName}"></td>
            <td th:text="${r.contactPerson}"></td>
            <td th:text="${r.email}"></td>
            <td th:text="${r.phone}"></td>
            <td>
                <a th:href="'https://' + ${r.web}"
                   th:text="${r.web}"
                   target="_blank"></a>
            </td>
            <td th:text="${r.address}"></td>
        </tr>
        </tbody>
    </table>

    <a class="button" href="/">Back</a>
</div>
</body>
</html>
